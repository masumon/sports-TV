# Deploy Next.js app in /frontend to Vercel on every push to main.
#
# Setup (one-time):
# 1. Create a project at https://vercel.com/new — import this repo, set Root Directory to: frontend
# 2. In Vercel: Project → Settings → Environment Variables → add NEXT_PUBLIC_API_BASE_URL (your API URL)
# 3. In Vercel: Project → Settings → General → copy "Project ID" and Team / Personal "Team ID"
# 4. In GitHub: repo → Settings → Secrets and variables → Actions → add:
#    VERCEL_TOKEN      (Vercel → Account Settings → Tokens)
#    VERCEL_ORG_ID     (Team ID from step 3)
#    VERCEL_PROJECT_ID (Project ID from step 3)
#
# If you instead enable Vercel’s built-in “Git” deployments for this repo, remove this workflow
# or turn off “Automatic deployments” for the Git connection to avoid double deploys.

name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"

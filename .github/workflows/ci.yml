# Validates backend and frontend on every push and PR to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
      - name: Syntax and import check
        run: |
          python3 -m compileall -q app
          python3 -c "from app.main import app; assert app.title"
      - name: M3U seed URLs (smoke)
        working-directory: ${{ github.workspace }}
        run: python3 scripts/check_m3u_sources.py

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint, and build
        run: |
          npm ci
          npm run lint
          npm run build

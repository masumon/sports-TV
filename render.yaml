# Render Blueprint — Web Service for the FastAPI backend (monorepo root: this file lives next to backend/)
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy: set CORS_ORIGINS to your Vercel URL(s), comma-separated, no trailing slashes.
# Include preview URLs too if the frontend calls the API with an absolute origin (e.g. direct Render URL
# in NEXT_PUBLIC_API_BASE_URL). When the app uses same-origin /api (recommended), CORS is not needed
# for viewer traffic, but admin/auth from another origin still needs a matching entry here.

services:
  - type: web
    name: gstv-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SCRAPER_SOURCE_URL
        value: https://iptv-org.github.io/iptv/categories/sports.m3u
      - key: AUTO_SYNC_CHANNELS_ON_STARTUP
        value: "true"
      # Optional: Upstash/Redis — response cache for channel lists
      - key: REDIS_URL
        sync: false
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: SYNC_RATE_LIMIT_SECONDS
        value: "30"
      # M3U sync every 5 minutes — backend scheduler runs automatically, no admin login needed
      - key: SCHEDULED_SYNC_INTERVAL_MINUTES
        value: "5"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@test.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        sync: false
      # Required if browser uses NEXT_PUBLIC_API_BASE_URL=https://<render-host> (direct API from Vercel).
      - key: CORS_ORIGINS
        value: "https://sports-tv-lovat.vercel.app,http://localhost:3000"
